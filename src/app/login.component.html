<div class="min-h-screen bg-white relative">
  <img src="assets/logo.svg" alt="Vovó Crochê" class="absolute top-6 left-6 w-8 h-auto" />

  <div class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-xs px-3">
      <div class="bg-white rounded-lg shadow-sm p-4">
        <h1 class="text-xl font-bold text-left mb-5">
          Bem-vindo(a)<br/>de volta!
        </h1>

        <form (ngSubmit)="submit()" class="space-y-2">
          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Email</label>
            <div class="relative">
              <input 
                [(ngModel)]="email" 
                name="email" 
                type="email" 
                required 
                class="w-full px-2 py-1 text-xs border border-gray-200 rounded-sm focus:outline-none focus:ring-1 focus:ring-gray-300 mb-2" 
              />
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1">Senha</label>
            <div class="relative">
              <input 
                [(ngModel)]="password" 
                name="password" 
                [type]="showPassword ? 'text' : 'password'" 
                required 
                class="w-full px-2 py-1 text-xs border border-gray-200 rounded-sm focus:outline-none focus:ring-1 focus:ring-gray-300" 
              />
              <button 
                type="button" 
                (click)="toggleShow()" 
                class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500"
              >
                <span *ngIf="!showPassword">
                  <img src="assets/eye.svg" alt="olho aberto" class="w-3 h-3" />
                </span>
                <span *ngIf="showPassword">
                  <img src="assets/eye-closed.svg" alt="olho fechado" class="w-3 h-3" />
                </span>
              </button>
            </div>

            <div class="text-right mt-3">
              <a href="#" class="text-[10px] text-gray-600 underline">
                Esqueceu a senha?
              </a>
            </div>
          </div>

          <div>
            <button 
              type="submit" 
              class="w-full bg-black text-white py-1 rounded-sm font-medium text-[11px]"
            >
              Entrar
            </button>
          </div>
        </form>

        <div class="mt-3">
          <div class="flex items-center">
            <div class="flex-grow border-t border-gray-200"></div>
            <div class="px-2 text-[10px] text-gray-400">Ou</div>
            <div class="flex-grow border-t border-gray-200"></div>
          </div>

          <div class="mt-2 flex justify-center gap-2">
            <button class="w-7 h-7 flex items-center justify-center">
              <img src="assets/google-login.svg" alt="google login" class="w-4 h-4">
            </button>
            <button class="w-7 h-7 flex items-center justify-center">
              <img src="assets/facebook-login.svg" alt="facebook login" class="w-4 h-4">
            </button>
          </div>
        </div>

        <p class="mt-3 text-center text-[10px] text-gray-500">
          Não tem uma conta?
          <a routerLink="/signup" class="underline text-gray-700">
            Cadastrar-se
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
